name: Sync Plugin Skills

on:
  push:
    branches: [ main ]
    paths:
      - 'src/CrestApps.AgentSkills/orchardcore/**'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-plugin-skills:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Copy Orchard Core skills into plugin folder
      shell: bash
      run: |
        destination="plugins/crestapps-orchardcore/skills/orchardcore"

        mkdir -p "$destination"

        rsync -a --delete \
          --exclude 'bin/' \
          --exclude 'obj/' \
          --exclude 'lib/' \
          src/CrestApps.AgentSkills/orchardcore/ \
          "$destination"/

    - name: Increment plugin patch version
      shell: python
      run: |
        import json
        import re
        from pathlib import Path

        plugin_json_path = Path("plugins/crestapps-orchardcore/plugin.json")
        plugin_json = json.loads(plugin_json_path.read_text(encoding="utf-8"))

        version = plugin_json.get("version", "")
        match = re.fullmatch(r"(\d+)\.(\d+)\.(\d+)(.*)?", version)
        if match is None:
            raise SystemExit(f"Unsupported plugin version format: {version}")

        major, minor, patch, suffix = match.groups()
        plugin_json["version"] = f"{major}.{minor}.{int(patch) + 1}{suffix or ''}"

        plugin_json_path.write_text(
            json.dumps(plugin_json, indent=2, ensure_ascii=False) + "\n",
            encoding="utf-8",
        )

    - name: Create plugin sync pull request
      uses: peter-evans/create-pull-request@v7
      with:
        branch: automation/sync-plugin-skills
        delete-branch: true
        commit-message: |
          chore: sync plugin skills
        title: |
          chore: sync plugin skills
        body: |
          ## Summary

          - copy the Orchard Core skills into `plugins/crestapps-orchardcore/skills/orchardcore`
          - increment the patch version in `plugins/crestapps-orchardcore/plugin.json`

          ## Notes

          This PR was created automatically from changes under `src/CrestApps.AgentSkills/orchardcore/`.
        add-paths: |
          plugins/crestapps-orchardcore/plugin.json
          plugins/crestapps-orchardcore/skills/**
        labels: |
          automation
